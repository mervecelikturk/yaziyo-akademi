    <!-- GitHub Pages 404: tarayıcı URL'si derin olabilir; tüm varlıklar kök mutlak yol -->
    <base href="/">

    <script>
        (function () {
            if (!sessionStorage.getItem('yaziyo-session-active')) {
                localStorage.setItem('yaziyo-theme', 'light');
                sessionStorage.setItem('yaziyo-session-active', 'true');
            }
            const savedTheme = localStorage.getItem('yaziyo-theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#0F172A',
                        'dark-card': '#1E2937',
                        'dark-text': '#F1F5F9',
                        'dark-text-secondary': '#CBD5E1',
                        'dark-border': '#334155',
                        'light-bg': '#F8F4ED',
                        'light-card': '#FFFFFF',
                        'light-text': '#1E2937',
                        'light-text-secondary': '#334155',
                        'light-border': '#E6D9C2',
                        'yaziyo-gold': 'rgb(var(--yaziyo-gold-rgb) / <alpha-value>)',
                    },
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow-gold': '0 0 15px rgba(217, 119, 6, 0.3)',
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

<body class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text font-inter min-h-screen flex flex-col transition-colors duration-300">

    <main class="flex-grow w-full flex items-center">
        <section class="nf-hero max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16 w-full text-center">

            <p class="nf-fade-in text-xs font-poppins font-bold uppercase tracking-[0.25em] text-yaziyo-gold mb-3">
                Sayfa Bulunamadı
            </p>

            <h1 class="nf-fade-in nf-fade-in--delay-1 nf-code font-poppins font-extrabold mb-4" aria-label="404">
                404
            </h1>

            <p class="nf-fade-in nf-fade-in--delay-2 text-base sm:text-lg text-light-text-secondary dark:text-dark-text-secondary max-w-xl mx-auto leading-relaxed mb-8">
                Aradığınız sayfa taşınmış, silinmiş veya adresi yanlış yazılmış olabilir.
            </p>

            <div class="nf-fade-in nf-fade-in--delay-2 max-w-2xl mx-auto mb-8 rounded-2xl border border-light-border dark:border-dark-border bg-light-card/80 dark:bg-dark-card/80 backdrop-blur-sm p-4 sm:p-5 text-left">
                <p class="text-[10px] font-poppins font-bold uppercase tracking-widest text-yaziyo-gold mb-2">
                    İstenen adres
                </p>
                <p id="nf-requested-path" class="nf-path-box text-sm text-light-text dark:text-dark-text">/</p>
            </div>

            <div id="nf-suggestion" class="nf-fade-in nf-fade-in--delay-3 hidden max-w-2xl mx-auto mb-8 rounded-2xl border border-yaziyo-gold/30 bg-yaziyo-gold/5 p-4 sm:p-5 text-left">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <p class="text-[10px] font-poppins font-bold uppercase tracking-widest text-yaziyo-gold mb-1">
                            Bunu mu aradınız?
                        </p>
                        <p class="text-sm text-light-text dark:text-dark-text">
                            <span id="nf-suggestion-label" class="font-semibold"></span> sayfasına yönlendirilebilirsiniz.
                        </p>
                    </div>
                    <a id="nf-suggestion-link" href="/index.html"
                        class="inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-yaziyo-gold text-slate-900 font-poppins font-bold text-sm hover:shadow-glow-gold transition-all shrink-0">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        Sayfaya Git
                    </a>
                </div>
            </div>

            <div class="nf-fade-in nf-fade-in--delay-3 flex flex-col sm:flex-row items-center justify-center gap-3">
                <a href="/index.html"
                    class="inline-flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 rounded-xl bg-gradient-to-r from-yaziyo-gold to-yellow-600 text-slate-900 font-poppins font-bold text-sm hover:shadow-glow-gold hover:scale-[1.02] active:scale-95 transition-all">
                    <i class="fa-solid fa-house"></i>
                    Ana Sayfaya Dön
                </a>
                <button type="button" onclick="history.length > 1 ? history.back() : (window.location.href='/index.html')"
                    class="inline-flex items-center justify-center gap-2 w-full sm:w-auto px-6 py-3 rounded-xl border border-light-border dark:border-dark-border bg-light-card dark:bg-dark-card font-poppins font-bold text-sm hover:border-yaziyo-gold hover:text-yaziyo-gold transition-all">
                    <i class="fa-solid fa-arrow-left"></i>
                    Geri Git
                </button>
            </div>
        </section>
    </main>

    <script src="/js/notFound.js"></script>
</body>

</html>
